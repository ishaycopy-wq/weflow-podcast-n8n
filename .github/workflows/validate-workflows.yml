name: Validate n8n Workflows

on:
  push:
    branches: ["**"]
    paths:
      - "workflows/**"
      - "scripts/validate-workflows.js"
      - ".github/workflows/validate-workflows.yml"
  pull_request:
    branches: [main]
    paths:
      - "workflows/**"
      - "scripts/validate-workflows.js"

permissions:
  contents: read
  pull-requests: write  # to post PR comments on failure

jobs:
  validate:
    name: Validate n8n Workflow JSONs
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: List workflow files
        run: |
          echo "## Workflow files to validate:" >> $GITHUB_STEP_SUMMARY
          ls -lh workflows/*.json | awk '{print "- `"$NF"`"}' >> $GITHUB_STEP_SUMMARY || true

      - name: Run validator
        id: validate
        run: |
          node scripts/validate-workflows.js 2>&1 | tee /tmp/validation-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Add validation results to job summary
        if: always()
        run: |
          echo "## n8n Workflow Validation Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/validation-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Comment on PR (on failure)
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('/tmp/validation-output.txt', 'utf8');
            const body = [
              '## ❌ n8n Workflow Validation Failed',
              '',
              'One or more workflow JSON files failed validation. Fix the errors below before merging.',
              '',
              '```',
              output.substring(0, 6000),
              '```',
              '',
              '**Common fixes:**',
              '- Check that `name`, `nodes`, and `connections` are present at the top level',
              '- Ensure every node has `name`, `type`, and `position`',
              '- Connection targets must match node names exactly (case-sensitive)',
              '- JSON must be valid — run `node -e "JSON.parse(require(\'fs\').readFileSync(\'workflows/your-file.json\', \'utf8\'))"` locally',
            ].join('\n');
            
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Fail job on validation errors
        if: steps.validate.outputs.exit_code != '0'
        run: |
          echo "Validation failed. See output above."
          exit 1
